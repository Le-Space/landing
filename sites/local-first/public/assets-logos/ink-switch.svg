<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="inkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#inkGradient)" opacity="0.1"/>
  
  <!-- Ink drop shape -->
  <path d="M100 40 C120 60, 120 80, 100 100 C80 80, 80 60, 100 40 Z" fill="url(#inkGradient)" opacity="0.8"/>
  
  <!-- Switch element -->
  <rect x="70" y="110" width="60" height="20" rx="10" fill="url(#inkGradient)" opacity="0.6"/>
  <circle cx="85" cy="120" r="8" fill="white"/>
  
  <!-- Text -->
  <text x="100" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#inkGradient)">
    Ink &amp; Switch
  </text>
</svg>
